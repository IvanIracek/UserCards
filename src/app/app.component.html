<app-header />

<main>
  <ul id="users">
    <li id="search">
      <mat-form-field appearance="outline">
        <mat-label>Search</mat-label>
        <input matInput [(ngModel)]="searchQuery" />
        <button *ngIf="searchQuery" matSuffix mat-icon-button (click)="searchQuery = ''">
          <mat-icon>close</mat-icon>
        </button>
        <mat-icon *ngIf="!searchQuery" matSuffix>search</mat-icon>
      </mat-form-field>
    </li>
    @for (user of users; track user.id) {
    <li>
      <app-user [user]="user" [selected]="user.id === selectedUserId" (select)="onSelectUser($event)" />
    </li>
    }
  </ul>

  @if (selectedUser) {
  <app-tasks [userId]="selectedUser.id" [name]="selectedUser.name" />
  } @else {
  <p id="fallback">Select a user to see their tasks!</p>
  }
</main>
